# RunPod GraphQL Schema (Extracted from runpod/node/graphql)
# This schema defines the core types and operations for RunPod resources

# ============================================================================
# Scalar Types
# ============================================================================

scalar DateTime

# ============================================================================
# Enums
# ============================================================================

enum PodType {
  INTERRUPTABLE
  RESERVED
  BID
  BACKGROUND
}

enum PodStatus {
  CREATED
  RUNNING
  RESTARTING
  EXITED
  PAUSED
  DEAD
  TERMINATED
}

enum CloudTypeEnum {
  SECURE
  COMMUNITY
  ALL
}

enum ClusterRole {
  LEADER
  WORKER
}

# ============================================================================
# Pod Types
# ============================================================================

type Pod {
  id: String!
  name: String!
  machineId: String!
  imageName: String
  dockerArgs: String
  gpuCount: Int!
  gpuPowerLimitPercent: Int!
  vcpuCount: Float!
  memoryInGb: Float!
  containerDiskInGb: Int
  volumeInGb: Float
  volumeMountPath: String
  volumeEncrypted: Boolean!
  volumeKey: String
  desiredStatus: PodStatus!
  podType: PodType
  costPerHr: Float!
  adjustedCostPerHr: Float!
  costMultiplier: Float
  env: [String]
  ports: String
  port: Port
  templateId: String
  containerRegistryAuthId: String
  networkVolumeId: String
  clusterIp: String
  clusterIdx: Int
  clusterCidr: String
  clusterRole: ClusterRole
  createdAt: DateTime
  lastStatusChange: String
  lastStartedAt: DateTime
  uptimeSeconds: Int
  locked: Boolean
  testPod: Boolean
  runtime: PodRuntime
  machine: Machine
}

type PodRuntime {
  id: String!
  podId: String!
  machineId: String!
  gpuCount: Int!
  vcpuCount: Int!
  uptimeInSeconds: Int!
  ports: [RuntimePort]
}

type RuntimePort {
  privatePort: Int!
  publicPort: Int
  ip: String
  type: String
  isIpPublic: Boolean!
}

type Port {
  privatePort: Int!
  publicPort: Int
  ip: String
  type: String
  isIpPublic: Boolean!
}

type Machine {
  id: String!
  gpuDisplayName: String
  gpuCount: Int!
  vcpuCount: Int!
  memoryInGb: Int!
  diskSpaceInGb: Int!
}

# ============================================================================
# Network Volume Types
# ============================================================================

type NetworkVolume {
  id: String!
  name: String!
  size: Int!
  dataCenterId: String!
}

# ============================================================================
# Serverless / AI API Types
# ============================================================================

type AiApi {
  id: String!
  name: String!
  gpuTypeId: String
  idleTimeout: Int
  executionTimeout: Int
  minWorkers: Int
  maxWorkers: Int
  imageName: String
  env: [String]
}

# ============================================================================
# Pod Template Types
# ============================================================================

type PodTemplate {
  id: String!
  name: String!
  imageName: String!
  dockerArgs: String
  env: [String]
  ports: String
  volumeMountPath: String
  startCommand: String
}

# ============================================================================
# SSH Key Types
# ============================================================================

type SshKey {
  id: String!
  name: String!
  publicKey: String!
  fingerprint: String
}

# ============================================================================
# Secret Types
# ============================================================================

type Secret {
  id: String!
  name: String!
  # value is write-only, not returned
}

# ============================================================================
# Registry Credential Types
# ============================================================================

type ContainerRegistryAuth {
  id: String!
  name: String!
  registryUrl: String!
  username: String!
  # password is write-only
}

# ============================================================================
# Cluster Types
# ============================================================================

type ClusterMember {
  podId: String!
  ip: String!
  idx: Int!
}

type ClusterNetwork {
  podId: String!
  ip: String!
}

# ============================================================================
# Input Types
# ============================================================================

input EnvironmentVariableInput {
  key: String!
  value: String!
}

input PodFilter {
  podId: String!
}

# Pod Rent Interruptable (Spot) - Primary creation method
input PodRentInterruptableInput {
  name: String
  gpuTypeId: String
  gpuCount: Int
  cloudType: CloudTypeEnum
  imageName: String
  dockerArgs: String
  env: [EnvironmentVariableInput]
  ports: String
  port: Port
  volumeInGb: Int
  volumeKey: String
  volumeMountPath: String
  containerDiskInGb: Int
  templateId: String
  networkVolumeId: String
  containerRegistryAuthId: String
  startJupyter: Boolean
  startSsh: Boolean
  minVcpuCount: Int
  minMemoryInGb: Int
  minDisk: Int
  minDownload: Int
  minUpload: Int
  supportPublicIp: Boolean
  dataCenterId: String
  countryCode: String
  bidPerGpu: Float
  stopAfter: String
  terminateAfter: String
  cudaVersion: String
  allowedCudaVersions: [String]
}

# Pod Rent Non-Interruptable (On-Demand)
input PodRentNonInterruptableInput {
  name: String
  machineId: String!
  imageName: String
  dockerArgs: String
  gpuCount: Int!
  cloudType: CloudTypeEnum
  volumeInGb: Int
  volumeKey: String
  costPerHr: Float!
  port: Port
  ports: String
  stopAfter: DateTime
  terminateAfter: DateTime
  volumeMountPath: String
  env: [EnvironmentVariableInput]
  containerDiskInGb: Int
  templateId: String
  startJupyter: Boolean
  startSsh: Boolean
}

input PodEditJobInput {
  podId: String!
  dockerArgs: String
  imageName: String
  env: [EnvironmentVariableInput]
}

input NetworkVolumeInput {
  name: String!
  size: Int!
  dataCenterId: String!
}

input AiApiInput {
  name: String!
  gpuTypeId: String
  idleTimeout: Int
  executionTimeout: Int
  minWorkers: Int
  maxWorkers: Int
  imageName: String!
  env: [EnvironmentVariableInput]
}

input PodTemplateInput {
  name: String!
  imageName: String!
  dockerArgs: String
  env: [EnvironmentVariableInput]
  ports: String
  volumeMountPath: String
  startCommand: String
}

input SshKeyInput {
  name: String!
  publicKey: String!
}

input SecretInput {
  name: String!
  value: String!
}

input ContainerRegistryAuthInput {
  name: String!
  registryUrl: String!
  username: String!
  password: String!
}

# ============================================================================
# Queries
# ============================================================================

type Query {
  pod(input: PodFilter): Pod
  myself: User
}

type User {
  id: String!
  pods: [Pod]
}

# ============================================================================
# Mutations
# ============================================================================

type Mutation {
  # Pod Operations
  podRentInterruptable(input: PodRentInterruptableInput!): Pod
  podRentNonInterruptable(input: PodRentNonInterruptableInput!): Pod
  podEditJob(input: PodEditJobInput!): Pod
  podStop(input: PodFilter!): Pod
  podResume(input: PodFilter!): Pod
  podTerminate(input: PodFilter!): Pod

  # Network Volume Operations
  createNetworkVolume(input: NetworkVolumeInput!): NetworkVolume
  deleteNetworkVolume(id: String!): Boolean

  # AI API / Serverless Operations
  createAiApi(input: AiApiInput!): AiApi
  updateAiApi(id: String!, input: AiApiInput!): AiApi
  deleteAiApi(id: String!): Boolean

  # Pod Template Operations
  savePodTemplate(input: PodTemplateInput!): PodTemplate
  deletePodTemplate(id: String!): Boolean

  # SSH Key Operations
  saveSshKey(input: SshKeyInput!): SshKey
  deleteSshKey(id: String!): Boolean

  # Secret Operations
  saveSecret(input: SecretInput!): Secret
  deleteSecret(id: String!): Boolean

  # Registry Credential Operations
  saveRegistryAuth(input: ContainerRegistryAuthInput!): ContainerRegistryAuth
  deleteRegistryAuth(id: String!): Boolean
}
