# @genqlient
mutation SaveEndpoint($input: EndpointInput!) {
  # @genqlient(typename: "EndpointResponse")
  saveEndpoint(input: $input) {
    id
    name
    templateId
    gpuIds
    workersMin
    workersMax
    idleTimeout
    locations
    scalerType
    scalerValue
    networkVolumeId
    gpuCount
    instanceIds
    workersPFBTarget
    allowedCudaVersions
    minCudaVersion
    executionTimeoutMs
    flashBootType
    type
    modelReferences
  }
}

# @genqlient
query GetMyEndpoints {
  myself {
    # @genqlient(typename: "EndpointResponse")
    endpoints {
      id
      name
      templateId
      gpuIds
      workersMin
      workersMax
      idleTimeout
      locations
      scalerType
      scalerValue
      networkVolumeId
      gpuCount
      instanceIds
      workersPFBTarget
      allowedCudaVersions
      minCudaVersion
      executionTimeoutMs
      flashBootType
      type
      modelReferences
    }
  }
}

# @genqlient
mutation DeleteEndpoint($id: String!) {
  deleteEndpoint(id: $id)
}
