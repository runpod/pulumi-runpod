name: runpod-example
runtime: yaml

# Set your RunPod API key via: pulumi config set runpod:apiKey --secret YOUR_KEY
# Or set the RUNPOD_API_KEY environment variable.

resources:
  myTemplate:
    type: runpod:Template
    properties:
      name: my-pulumi-template
      imageName: runpod/pytorch:2.1.0-py3.10-cuda11.8.0-devel-ubuntu22.04
      containerDiskInGb: 20
      volumeInGb: 20
      startSsh: true

outputs:
  templateId: ${myTemplate.templateId}
