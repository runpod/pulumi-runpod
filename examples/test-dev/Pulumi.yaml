name: runpod-dev-test
runtime: yaml
description: Test RunPod provider against dev API

variables:
  cpuFlavors:
    fn::invoke:
      function: runpod:index:getCpuFlavors
      arguments: {}
  dataCenters:
    fn::invoke:
      function: runpod:index:getDataCenters
      arguments: {}

resources:
  # 1. Template (no cost)
  testTemplate:
    type: runpod:Template
    properties:
      name: pulumi-test-template
      imageName: runpod/pytorch:2.1.0-py3.10-cuda11.8.0-devel-ubuntu22.04
      containerDiskInGb: 5
      volumeInGb: 0
      dockerArgs: ""
      startSsh: true
      isServerless: true
      env:
        TEST_KEY: test_value

  # 2. Endpoint (no cost at 0 workers)
  testEndpoint:
    type: runpod:Endpoint
    properties:
      name: pulumi-test-endpoint
      templateId: ${testTemplate.templateId}
      gpuIds: "NVIDIA GeForce RTX 4090"
      workersMin: 0
      workersMax: 1
      gpuCount: 1
      idleTimeout: 5

  # 3. GPU Pod
  gpuPod:
    type: runpod:Pod
    properties:
      name: pulumi-test-gpu-pod
      gpuTypeId: "NVIDIA GeForce RTX 4090"
      gpuCount: 1
      imageName: runpod/pytorch:2.1.0-py3.10-cuda11.8.0-devel-ubuntu22.04
      containerDiskInGb: 5
      cloudType: ALL
      startSsh: true
      env:
        GPU_TEST: "true"

  # 4. Network Volume (MFS-1 is the only DC with storage in dev, min 10GB)
  testVolume:
    type: runpod:NetworkVolume
    properties:
      name: pulumi-test-volume
      size: 10
      dataCenterId: "MFS-1"

  # 5. Secret
  testSecret:
    type: runpod:Secret
    properties:
      name: pulumi-test-secret-2
      value: "supersecret123"
      description: "Pulumi provider test secret"

  # 6. Container Registry Auth
  testRegistryAuth:
    type: runpod:ContainerRegistryAuth
    properties:
      name: pulumi-test-registry
      username: testuser
      password: testpassword123

  # 7. CPU Pod (cpu5c = Compute-Optimized, 2 vCPUs, 4GB RAM)
  cpuPod:
    type: runpod:Pod
    properties:
      name: pulumi-test-cpu-pod
      gpuTypeId: "cpu5c"
      computeType: "CPU"
      instanceIds:
        - "cpu5c-2-4"
      imageName: runpod/base:0.4.4
      containerDiskInGb: 5
      startSsh: true
      env:
        CPU_TEST: "true"

outputs:
  templateId: ${testTemplate.templateId}
  endpointId: ${testEndpoint.endpointId}
  gpuPodId: ${gpuPod.podId}
  cpuPodId: ${cpuPod.podId}
  volumeId: ${testVolume.networkVolumeId}
  secretId: ${testSecret.secretId}
  registryAuthId: ${testRegistryAuth.registryAuthId}
  availableCpuFlavors: ${cpuFlavors.cpuFlavors}
  availableDataCenters: ${dataCenters.dataCenters}
