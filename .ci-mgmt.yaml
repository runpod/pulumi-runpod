template: native
provider: runpod
major-version: 0
providerDefaultBranch: main
publishRegistry: true
providerVersion: github.com/runpod/pulumi-runpod/provider.Version
parallel: 3
sdkModuleDir: sdk/go/runpod
esc:
    enabled: true
    environment: imports/github-secrets
# For some reason this is required. If it's omitted all of the env keys get duplicated.
envOverride:
    FOO: BAR
